      <h1>Youssef Baamel — Full-Stack Engineer</h1>
      <p><strong>Stack:</strong> React, Next.js, TypeScript, JavaScript, Node.js, Python, FastAPI, Django, PostgreSQL, REST APIs, AWS, Docker, React Native, Directus CMS, Express.js, Redis, Celery</p>

      <h2>About</h2>
      <p>Full-Stack Engineer with 5+ years building and shipping production web and mobile applications. CS degree from ENSET Mohammedia. Strong in front-end architecture with React and Next.js, and backend development with Node.js, Python, FastAPI, and PostgreSQL. Shipped client-facing solutions across telecommunications (Bouygues Telecom), pharmaceutical (Blink Pharma), medical (MEDIOT), and railway (ONCF) sectors. Currently building AI-powered tools including Debrief, an open-source meeting summarizer using Whisper and LLMs.</p>

      <h2>Work Experience</h2>

      <h3>Front End Engineer — BTECHNOLOGIE · Bouygues Telecom x Accenture</h3>
      <p><em>January 2025 – Present · Rabat, Morocco</em></p>
      <p>Building client-facing web and mobile applications with React, Next.js, and TypeScript for Bouygues Telecom, France's third-largest telecom operator. Architecting a partials system driven by a Directus headless CMS, enabling marketing teams to manage content independently. Using AWS for backend services and asset processing pipelines. Focus on front-end architecture, reusable component systems, performance optimization, and responsive UX across devices.</p>

      <h3>Full Stack Engineer — 1450 Factory · Blink Pharma</h3>
      <p><em>September 2023 – September 2024 · Casablanca, Morocco</em></p>
      <p>Developed full-stack web and mobile applications for clients in the pharmaceutical sector. Key role on blinkpharma.ma, a digital platform for pharmaceutical professionals in Morocco. Built the original Python backend from scratch, then led the migration to a Next.js fullstack architecture. Delivered tailored solutions using React, Next.js, Python, and Node.js. Also shipped Blink Premium, a medical iOS app for pharmaceutical reps, available on the App Store.</p>

      <h3>Full Stack Engineer — MEDIOT</h3>
      <p><em>June 2023 – September 2023 · Casablanca, Morocco</em></p>
      <p>Full-stack development of medical-sector applications (telemedicine and mobile medical units) using React.js and Node.js in an Agile environment. Delivered features end to end from design to deployment.</p>

      <h3>Full Stack Engineer — Algo Consulting Group · ONCF</h3>
      <p><em>January 2022 – March 2023 · Rabat, Morocco</em></p>
      <p>Full-stack development with React.js and Node.js for ONCF, Morocco's national railway operator. Enhanced the Supratours and ONCF Voyages online train-ticket booking platforms used by hundreds of thousands of travellers. Implemented RTL Arabic localization and advised on UX for the merchant site redesign.</p>

      <h3>Full Stack Developer — Freelance (Self-employed)</h3>
      <p><em>February 2020 – December 2021</em></p>
      <p>Collaborated with clients to define project goals, timelines, and deliverables. Delivered full-stack projects using Python (Django), Node.js, React.js, and Vue.js, working across front-end, backend, and CMS development.</p>
